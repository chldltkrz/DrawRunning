name: draw_running
description: "GPS Art Running App - Draw text on maps by running"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Google Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Navigation
  go_router: ^14.6.2

  # Local Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # Utilities
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
